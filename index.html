<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY WEBSITE - Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { color: #fff; overflow-x: hidden; background-color: #000; min-height: 100vh; }

        /* VANTA BACKGROUND */
        #vanta-canvas { position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: -1; }

        /* LOGIN OVERLAY STYLING */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: 0.8s ease-in-out;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .login-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; width: 90%; max-width: 400px;
            text-align: center; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .login-card .logo-big { font-size: 38px; font-weight: 800; color: #fff; letter-spacing: 4px; margin-bottom: 30px; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #fff; }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #fff; background: rgba(255,255,255,0.2); }
        
        .btn-login {
            width: 100%; padding: 15px; background: #fff; color: #ff4757; border: none;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* MAIN WEBSITE CONTENT (Initially Hidden) */
        #main-content { display: none; }

        /* Navbar & Grid Styles */
        .top-bar { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); padding: 10px 10%; display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; }
        .navbar { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 25px 0; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { font-size: 34px; font-weight: 800; color: #ff4757; letter-spacing: 4px; }
        .nav-links { list-style: none; display: flex; justify-content: center; gap: 40px; margin-top: 15px; }
        .nav-links a { text-decoration: none; color: #fff; font-weight: 600; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: #ff4757; }
        
        .container { padding: 80px 10%; max-width: 1400px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 35px; }
        .product-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); padding: 30px; border-radius: 30px; text-align: center; transition: 0.5s; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        .product-card:hover { transform: translateY(-15px); background: rgba(255, 255, 255, 0.12); border-color: #ff4757; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); }
        .img-wrapper { height: 220px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); border-radius: 20px; margin-bottom: 20px; }
        .img-wrapper img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .footer { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); padding: 100px 10% 40px; margin-top: 100px; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 50px; }
        .footer-box h3 { color: #ff4757; margin-bottom: 30px; font-size: 18px; text-transform: uppercase; }
        .footer-box p, .footer-box a { color: #cbd5e1; text-decoration: none; font-size: 14px; margin-bottom: 12px; display: block; }
        .footer-bottom { text-align: center; margin-top: 60px; padding-top: 30px; color: #64748b; font-size: 13px; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <div class="logo-big">MY WEBSITE</div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">ENTER STORE</button>
            </form>
        </div>
    </div>

    <div id="main-content">
        <div id="vanta-canvas"></div>
        
        <div class="top-bar">
            <div><i class="fas fa-phone"></i> +91 9510403412</div>
            <div><i class="fas fa-envelope"></i> manavparmar0912007@gmail.com</div>
        </div>

        <nav class="navbar">
            <div class="logo">MY WEBSITE</div>
            <ul class="nav-links">
                <li><a href="#" onclick="location.reload()">Home</a></li>
                <li><a href="#products">Collection</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="#" onclick="location.reload()" style="color: #ff4757;">Logout</a></li>
            </ul>
        </nav>

        <div class="container" id="products">
            <h2 style="text-align: center; font-size: 32px; margin-bottom: 50px; font-weight: 800;">PREMIUM COLLECTION</h2>
            <div class="product-grid" id="p-grid"></div>
        </div>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-box"><h3>Navigation</h3><a href="#">Home</a><a href="#products">Products</a><a href="contact.html">Contact Us</a></div>
                <div class="footer-box"><h3>Expert Support</h3><p>manavparmar0912007@gmail.com</p><p>+91 9510403412</p></div>
            </div>
            <div class="footer-bottom"><p>MY WEBSITE (C) 2026 — ALL RIGHTS RESERVED</p></div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>

    <script>
        // --- Login Logic ---
        const loginForm = document.getElementById('loginForm');
        const loginOverlay = document.getElementById('login-overlay');
        const mainContent = document.getElementById('main-content');

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            
            // Hide Login and Show Content
            loginOverlay.style.opacity = '0';
            setTimeout(() => {
                loginOverlay.style.display = 'none';
                mainContent.style.display = 'block';
                
                // Initialize Vanta after showing content
                initVanta();
                loadProducts();
            }, 800);
        };

        // --- Vanta Background ---
        function initVanta() {
            VANTA.BIRDS({
                el: "#vanta-canvas",
                mouseControls: true,
                touchControls: true,
                backgroundColor: 0x070b14,
                color1: 0xff4757,
                color2: 0x1e293b,
                quantity: 3.00
            });
        }

        // --- Product Loading ---
        function loadProducts() {
            const prods = [
                ['Watch Ultra', 65999, 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500'],
                ['Sony XM5', 29990, 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=500'],
                ['iPhone 15 Pro', 129900, 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=500'],
                ['MacBook M3', 144900, 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?q=80&w=500'],
                ['iPad Pro M2', 81900, 'https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=500'],
                ['Fuji Camera', 139999, 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=500']
            ];

            const grid = document.getElementById('p-grid');
            grid.innerHTML = ''; // Clear previous
            prods.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" onclick="location.href='product-detail.html?name=${encodeURIComponent(p[0])}&price=${p[1]}&img=${encodeURIComponent(p[2])}'">
                        <div class="img-wrapper"><img src="${p[2]}"></div>
                        <h3>${p[0]}</h3>
                        <p>₹${p[1].toLocaleString('en-IN')}</p>
                    </div>`;
            });
        }
    </script>
</body>
</html>
