<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ShopEasy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #0f172a; color: white; min-height: 100vh; padding: 40px 5%; display: flex; flex-direction: column; align-items: center; }
        
        .back-nav { width: 100%; max-width: 1000px; margin-bottom: 20px; }
        .btn-back { text-decoration: none; color: #94a3b8; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-back:hover { color: #ff4757; }

        .detail-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            padding: 40px; 
            border-radius: 30px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 50px; 
            align-items: center; 
            max-width: 1000px; 
            width: 100%; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }

        .img-container { flex: 1; min-width: 300px; text-align: center; }
        .img-container img { max-width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .info-container { flex: 1; min-width: 300px; }
        h1 { font-size: 38px; margin-bottom: 10px; }
        .price-tag { font-size: 32px; color: #ff4757; font-weight: 800; margin-bottom: 20px; }

        .qty-container { display: flex; align-items: center; gap: 20px; margin: 30px 0; background: rgba(255,255,255,0.1); width: fit-content; padding: 10px 20px; border-radius: 15px; }
        .qty-btn { background: #ff4757; color: white; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; font-size: 18px; }
        
        .btn-buy { background: #ff4757; color: white; border: none; padding: 18px 40px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-buy:hover { background: #ff6b81; transform: translateY(-2px); }

        /* Modals Styling */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 25px; width: 90%; max-width: 420px; position: relative; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .bill-row { display: flex; justify-content: space-between; margin: 15px 0; font-size: 18px; color: #cbd5e1; }
        .total-row { border-top: 1px solid #475569; padding-top: 15px; font-weight: 800; font-size: 24px; color: #2ed573; }
        .close-modal { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 28px; color: #94a3b8; }

        /* QR Code Styling */
        .qr-container { background: white; padding: 15px; border-radius: 20px; margin: 20px 0; display: inline-block; }
        .qr-container img { width: 100%; max-width: 250px; display: block; }
        .payment-status { margin-top: 15px; font-size: 14px; color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="home.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <div class="detail-card">
        <div class="img-container">
            <img id="p-img" src="" alt="Product Image">
        </div>
        <div class="info-container">
            <h1 id="p-name">Product Name</h1>
            <div class="price-tag" id="p-price">₹0</div>
            
            <div class="qty-container">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qty-val" style="font-size: 22px; font-weight: bold; min-width: 30px; text-align: center;">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            
            <button class="btn-buy" onclick="showBill()">Proceed to Checkout</button>
        </div>
    </div>

    <div id="billModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('billModal')">&times;</span>
            <i class="fas fa-shopping-cart" style="font-size: 40px; color: #ff4757; margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">Order Summary</h2>
            <div class="bill-row"><span>Item:</span> <span id="b-name"></span></div>
            <div class="bill-row"><span>Qty:</span> <span id="b-qty"></span></div>
            <div class="bill-row total-row"><span>Total:</span> <span id="b-total"></span></div>
            <button class="btn-buy" style="background: #2ed573; margin-top: 20px;" onclick="goToPayment()">CONFIRM & PAY NOW</button>
        </div>
    </div>

 <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('paymentModal')">&times;</span>
            <h2 style="margin-bottom: 10px; font-weight: 800;">Scan to Pay</h2>
            <p style="color: #cbd5e1; font-size: 14px; margin-bottom: 20px;">Please pay the total amount to complete your order.</p>
            
            <div class="qr-container" style="background: #fff; padding: 15px; border-radius: 20px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-bottom: 20px;">
                <img src="qr.jpeg" alt="Payment QR Code" style="width: 100%; max-width: 280px; display: block; height: auto; border-radius: 10px;">
            </div>

            <div style="font-size: 32px; font-weight: 800; color: #2ed573; margin-bottom: 20px;">
                Total: <span id="pay-total">₹0</span>
            </div>

            <p class="payment-status" style="color: #94a3b8; font-size: 13px; font-style: italic; margin-bottom: 25px;">
                After payment, please take a screenshot for your records.
            </p>
            
            <button class="btn-buy" style="margin-top: 10px; background: #6366f1;" onclick="finishOrder()">I HAVE PAID</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Product";
        const price = parseFloat(params.get('price')) || 0;
        const img = params.get('img') || "";
        let qty = 1;

        // Load Data
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-price').innerText = "₹" + price.toLocaleString('en-IN');
        document.getElementById('p-img').src = img;

        function changeQty(v) {
            qty += v; if(qty < 1) qty = 1;
            document.getElementById('qty-val').innerText = qty;
        }

        function showBill() {
            document.getElementById('b-name').innerText = name;
            document.getElementById('b-qty').innerText = qty;
            const total = price * qty;
            document.getElementById('b-total').innerText = "₹" + total.toLocaleString('en-IN');
            document.getElementById('billModal').style.display = "flex";
        }

        function goToPayment() {
            const total = price * qty;
            document.getElementById('pay-total').innerText = "₹" + total.toLocaleString('en-IN');
            document.getElementById('billModal').style.display = "none";
            document.getElementById('paymentModal').style.display = "flex";
        }

        function closeModal(id) { 
            document.getElementById(id).style.display = "none"; 
        }

        function finishOrder() {
            alert('✅ Order details have been submitted! We will verify the payment and contact you soon.');
            window.location.href = 'home.html';
        }

        // Close modal if clicked outside
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
