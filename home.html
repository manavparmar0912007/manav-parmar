<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy - Birds Aesthetic Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* VANTA BACKGROUND CONTAINER */
        #vanta-canvas {
            position: fixed;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: -1; /* Background ke niche rahega */
        }

        body { color: #fff; overflow-x: hidden; background-color: #000; }

        /* Top Bar */
        .top-bar { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
            padding: 10px 10%; 
            display: flex; 
            justify-content: space-between; 
            font-size: 12px;
            color: #94a3b8;
        }

        /* Glassmorphism Navbar - Centered */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 25px 0;
            text-align: center;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { font-size: 34px; font-weight: 800; color: #ff4757; letter-spacing: 4px; }
        .nav-links { list-style: none; display: flex; justify-content: center; gap: 40px; margin-top: 15px; }
        .nav-links a { text-decoration: none; color: #fff; font-weight: 600; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: #ff4757; }

        /* Products Grid */
        .container { padding: 80px 10%; max-width: 1400px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 35px; }

        /* Premium Glass Cards */
        .product-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            transition: 0.5s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }
        .product-card:hover { 
            transform: translateY(-15px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff4757;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .img-wrapper { 
            height: 220px; display: flex; align-items: center; justify-content: center; 
            background: rgba(255, 255, 255, 0.05); border-radius: 20px; margin-bottom: 20px; 
        }
        .img-wrapper img { max-width: 85%; max-height: 85%; object-fit: contain; }

        /* Centered Footer */
        .footer { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); padding: 100px 10% 40px; margin-top: 100px; }
        .footer-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 50px; }
        .footer-box h3 { color: #ff4757; margin-bottom: 30px; font-size: 18px; text-transform: uppercase; }
        .footer-box p, .footer-box a { color: #cbd5e1; text-decoration: none; font-size: 14px; margin-bottom: 12px; display: block; }
        
        .insta-btn { background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 12px; color: #fff !important; transition: 0.3s; }
        .insta-btn:hover { background: #ff4757; }

        .footer-bottom { text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 60px; padding-top: 30px; color: #64748b; font-size: 13px; width: 100%; }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="top-bar">
        <div><i class="fas fa-phone"></i> +9510403412</div>
        <div><i class="fas fa-envelope"></i> manavparmar0912007@gmail.com</div>
    </div>

    <nav class="navbar">
        <div class="logo">SHOPEASY</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="#products">Collection</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="index.html" style="color: #ff4757;">Logout</a></li>
        </ul>
    </nav>

    <div class="container" id="products">
        <h2 style="font-size: 42px; margin-bottom: 60px; text-align: center; font-weight: 800;"></h2>
        <div class="product-grid" id="p-grid"></div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-box"><h3>Navigation</h3><a href="home.html">Home</a><a href="#products">Products</a><a href="contact.html">Contact Us</a></div>
            <div class="footer-box"><h3>Expert Support</h3><p>manavparmar0912007@gmail.com</p><p>+91 9510403412</p></div>
            <div class="footer-box"><h3>Follow Us</h3>
                <a href="https://www.instagram.com/manav_prajapati_70" target="_blank" class="insta-btn"><i class="fab fa-instagram"></i> Manav</a>
            </div>
        </div>
        <div class="footer-bottom"><p>SHOPEASYGROUP (C) 2026 — ALL RIGHTS RESERVED</p></div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>

    <script>
        // Initialize Vanta Birds Effect
        VANTA.BIRDS({
          el: "#vanta-canvas",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 1.00,
          scaleMobile: 1.00,
          backgroundColor: 0x070b14, // Deep dark background
          color1: 0xff4757, // Red birds
          color2: 0x1e293b,
          birdSize: 1.50,
          wingSpan: 20.00,
          separation: 50.00,
          alignment: 20.00,
          cohesion: 20.00,
          quantity: 3.00
        })

        // Product Loading
        const prods = [
            ['Watch Ultra', 799, 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500'],
            ['Sony XM5', 350, 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=500'],
            ['iPhone 15 Pro', 999, 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=500'],
            ['MacBook M3', 1999, 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?q=80&w=500'],
            ['iPad Pro M2', 1099, 'https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=500'],
            ['Fuji Camera', 1699, 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=500']
        ];
        const grid = document.getElementById('p-grid');
        prods.forEach(p => {
            grid.innerHTML += `<div class="product-card" onclick="location.href='product-detail.html?name=${encodeURIComponent(p[0])}&price=${p[1]}&img=${encodeURIComponent(p[2])}'"><div class="img-wrapper"><img src="${p[2]}"></div><h3>${p[0]}</h3><p>$${p[1]}</p></div>`;
        });
    </script>
</body>

</html>
